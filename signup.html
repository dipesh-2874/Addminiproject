<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="3d-effects.css">
</head>

<body class="auth-page">
  <div class="auth-container">
    <form id="signupForm">
      <h2>Create Account</h2>

      <div class="input-group">
        <input type="text" id="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-password" onclick="togglePassword('password', this)">&#128065;</span>
      </div>

      <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">&#128065;</span>
      </div>

      <div class="error" id="signupError"></div>

      <button type="submit">Sign Up</button>
      <p>Already have account? <a href="signin.html">Sign In</a></p>
    </form>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script>
    if (localStorage.getItem("loggedIn")) {
      window.location.href = getMainPagePath("index.html");
    }
  </script>
</body>
</html>
